name: Deploy FastAPI (Pull Only)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.125.55.210
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/news-ai-server

            # 최신 코드 가져오기
            git pull origin main

            # 가상환경 활성화
            source venv/bin/activate

            # 기존 서버 종료
            pkill -f "uvicorn" || true

            # 서버 실행
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &
