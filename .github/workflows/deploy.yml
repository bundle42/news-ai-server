name: Deploy FastAPI (Pull Only)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 13.125.55.210
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/news-ai-server

            echo "===== GIT PULL ====="
            git pull origin main

            echo "===== ACTIVATE VENV ====="
            source venv/bin/activate

            echo "===== STOP SERVER ====="
            lsof -ti:8000 | xargs kill -9 || true

            echo "===== START SERVER ====="
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > uvicorn.log 2>&1 &

            sleep 3

            echo "===== CHECK PROCESS ====="
            ps -ef | grep uvicorn

            echo "===== LAST LOG ====="
            tail -n 20 uvicorn.log
